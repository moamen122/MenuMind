name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menumind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d menumind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menumind
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/menumind
      JWT_SECRET: ci-jwt-secret-min-16-chars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (CI database)
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx jest --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: test
    # Required so DOCKERHUB_* secrets attached to the "menumind" environment are available
    environment: menumind
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (pull request — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: menumind-backend:ci

      - name: Check Docker Hub secrets
        if: github.event_name == 'push'
        run: |
          ok=0
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::DOCKERHUB_USERNAME is missing or empty. Add it as a repository secret, or as an environment secret on the same environment as this job (environment: menumind)."
            ok=1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::DOCKERHUB_TOKEN is missing or empty. Create a token at https://hub.docker.com/settings/security and add it as a repository or environment secret (exact name: DOCKERHUB_TOKEN)."
            ok=1
          fi
          exit $ok

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/menumind-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/menumind-backend:${{ github.sha }}
