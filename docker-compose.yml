# PostgreSQL for local development (matches Supabase/Production).
# Run: docker compose up -d
# Then: npx prisma db push   (or npx prisma migrate dev)
# Use Supabase DATABASE_URL only in Vercel/production env.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: menumind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d menumind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
