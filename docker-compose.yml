# PostgreSQL for local development only.
# Database only: docker compose up -d
# Full stack (API + frontend + this DB): docker compose -f docker-compose.dev.yml up --build
# Then from backend: npx prisma migrate deploy  (and optional npm run db:seed)
# Production: use Supabase or managed Postgres; set DATABASE_URL / DIRECT_URL in hosting env (not this file).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: menumind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d menumind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
